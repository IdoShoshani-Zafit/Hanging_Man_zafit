<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איש תלוי לשיעור מקוון - מותאם למובייל</title>
    <style>
        /* עיצוב כללי ורקע */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px; 
            color: #2c3e50; 
            margin: 0; 
            box-sizing: border-box;
        }
        
        h1 {
            color: #2c3e50;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            margin-top: 10px;
            font-size: 2.5rem;
        }

        /* אזור ההגדרות */
        .setup-section { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            max-width: 700px; 
            margin: 20px auto; 
            backdrop-filter: blur(5px);
        }
        
        /* רשימת המילים והקטגוריות */
        .words-list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .word-row {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .word-row span {
            font-weight: bold;
            color: #7f8c8d;
            width: 25px;
            text-align: right;
        }

        .cat-input, .word-input { 
            padding: 12px; 
            font-size: 1.05rem; 
            border: 2px solid #e0e6ed; 
            border-radius: 8px; 
            flex: 1;
            transition: all 0.3s;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .cat-input:focus, .word-input:focus { 
            border-color: #3498db; 
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.3); 
        }

        button.primary { 
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white; 
            border: none; 
            padding: 15px 35px; 
            border-radius: 30px; 
            font-size: 1.2rem; 
            font-weight: bold;
            cursor: pointer; 
            transition: all 0.2s; 
            box-shadow: 0 4px 15px rgba(52,152,219,0.4);
            margin-top: 10px;
            width: 100%;
            max-width: 300px;
        }
        button.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(52,152,219,0.6); }

        /* אזור המשחק */
        #game-area { 
            display: flex; 
            flex-direction: row-reverse; 
            justify-content: center; 
            align-items: flex-start; 
            gap: 50px; 
            max-width: 1100px; 
            margin: 20px auto; 
            padding: 20px; 
        }
        
        .game-main { flex: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        .hangman-visual { 
            width: 280px; 
            height: 320px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-sizing: border-box;
        }
        
        #category-display { 
            font-size: 1.4rem; 
            color: #7f8c8d; 
            font-weight: 600; 
            background: white;
            padding: 10px 25px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px; 
        }

        .word-counter {
            font-size: 1rem;
            color: #bdc3c7;
            margin-bottom: 10px;
        }
        
        #word-display { 
            font-size: 3.5rem; 
            font-weight: bold; 
            color: #2c3e50; 
            min-height: 80px; 
            margin: 15px 0 25px 0; 
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .letter-box { display: inline-block; min-width: 40px; text-align: center; border-bottom: 4px solid #2c3e50; padding-bottom: 5px; }
        .letter-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; display: inline-block; }
        .space-box { min-width: 30px; border: none; }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status { font-size: 1.6rem; margin: 15px 0; font-weight: bold; transition: color 0.3s; }
        .game-over { color: #e74c3c; animation: shake 0.5s; }
        .win { color: #2ecc71; animation: bounce 1s; }

        .letters-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 650px; margin-top: 10px; }
        .letter-btn { 
            width: 45px; 
            height: 45px; 
            font-size: 1.3rem; 
            cursor: pointer; 
            border: none; 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s; 
            font-weight: bold; 
            color: #34495e;
            /* מונע זום בטלפון בעת לחיצה כפולה */
            touch-action: manipulation; 
        }
        .letter-btn:hover:not(.disabled) { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); background: #f8f9fa; }
        .letter-btn.correct { background: #2ecc71; color: white; box-shadow: 0 0 15px rgba(46, 204, 113, 0.5); animation: popIn 0.3s; }
        .letter-btn.wrong { background: #e74c3c; color: white; opacity: 0.7; animation: shake 0.4s; }
        .disabled { pointer-events: none; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        #next-btn { 
            margin-top: 30px; 
            padding: 12px 35px; 
            cursor: pointer; 
            border-radius: 30px; 
            border: none; 
            background: #f39c12; 
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
            transition: all 0.2s; 
            display: none; 
        }
        #next-btn:hover { background: #e67e22; transform: translateY(-2px); }

        .hidden { display: none !important; }
        
        .draw-part { 
            stroke: #2c3e50; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; 
            stroke-dasharray: 300; stroke-dashoffset: 300; opacity: 0;
            transition: stroke-dashoffset 0.8s ease-out, opacity 0.3s ease-out;
        }
        .draw-part.visible { stroke-dashoffset: 0; opacity: 1; }

        /* =========================================
           התאמות למסכים קטנים (מובייל וטאבלטים)
           ========================================= */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 2rem; margin-top: 5px; }
            
            .setup-section { padding: 20px 15px; margin: 10px auto; }
            
            /* שינוי תצוגת הזנת המילים למובייל - ערימה במקום שורה */
            .word-row { 
                flex-direction: column; 
                align-items: flex-start; 
                background: rgba(236, 240, 241, 0.5); 
                padding: 15px; 
                border-radius: 12px;
                gap: 10px;
            }
            .word-row span { margin-bottom: 5px; color: #34495e; }
            
            /* סידור מחדש של אזור המשחק כך שהציור יהיה למעלה והמקלדת למטה */
            #game-area { 
                flex-direction: column; 
                align-items: center; 
                gap: 25px; 
                padding: 10px 0;
            }
            
            .hangman-visual { 
                width: 100%; 
                max-width: 280px; 
                height: auto; 
                aspect-ratio: 7/8; /* שומר על הפרופורציות של הציור */
            }
            
            #word-display { 
                font-size: 2.2rem; /* טקסט קטן יותר כדי שיכנסו מילים ארוכות */
                margin: 10px 0 15px 0;
            }
            
            .letter-box { min-width: 25px; border-bottom-width: 3px; }
            .space-box { min-width: 15px; }
            
            #category-display { font-size: 1.2rem; padding: 8px 20px; }
            .status { font-size: 1.3rem; }
            
            /* הקטנת כפתורי האותיות כדי שייכנסו בנוחות במסך קטן */
            .letter-btn { 
                width: 38px; 
                height: 38px; 
                font-size: 1.1rem; 
                border-radius: 8px;
            }
            
            .letters-grid { gap: 6px; }
        }
    </style>
</head>
<body>

    <h1>משחק איש תלוי</h1>

    <div id="setup" class="setup-section">
        <h2 style="color: #34495e; margin-top: 0; margin-bottom: 5px;">הגדרות המשחק</h2>
        <p style="color: #7f8c8d; margin-bottom: 25px;">הזן עד 10 מילים. לכל מילה ניתן לתת קטגוריה משלה (לא חובה למלא את כל השורות).</p>
        
        <div class="words-list-container" id="words-inputs-container">
            </div>

        <button class="primary" onclick="startSession()">התחל שיעור!</button>
    </div>

    <div id="game-area" class="hidden">
        
        <div class="game-main">
            <div class="word-counter" id="word-counter-display">מילה 1 מתוך 5</div>
            <div id="category-display">נושא: </div>
            <div id="word-display"></div>
            <div class="status" id="status-msg">פסילות: 0 מתוך 8</div>
            <div class="letters-grid" id="letters-container"></div>
            
            <button id="next-btn" onclick="goToNextWord()">למילה הבאה</button>
        </div>

        <div class="hangman-visual">
            <svg width="220" height="280" viewBox="0 0 220 280">
                <line x1="20" y1="260" x2="200" y2="260" stroke="#8e44ad" stroke-width="6" stroke-linecap="round"/>
                <line x1="60" y1="260" x2="60" y2="20" stroke="#8e44ad" stroke-width="6" stroke-linecap="round"/>
                <line x1="60" y1="20" x2="150" y2="20" stroke="#8e44ad" stroke-width="6" stroke-linecap="round"/>
                <line x1="150" y1="20" x2="150" y2="50" stroke="#e74c3c" stroke-width="4" />

                <circle id="part-1" class="draw-part" cx="150" cy="80" r="30" />
                <line id="part-2" class="draw-part" x1="150" y1="110" x2="150" y2="180" />
                <line id="part-3" class="draw-part" x1="150" y1="130" x2="110" y2="160" />
                <line id="part-4" class="draw-part" x1="150" y1="130" x2="190" y2="160" />
                <line id="part-5" class="draw-part" x1="150" y1="180" x2="120" y2="230" />
                <line id="part-6" class="draw-part" x1="150" y1="180" x2="180" y2="230" />
                <g id="part-7" class="draw-part">
                    <line x1="135" y1="70" x2="145" y2="80" stroke-width="3"/>
                    <line x1="145" y1="70" x2="135" y2="80" stroke-width="3"/>
                    <line x1="155" y1="70" x2="165" y2="80" stroke-width="3"/>
                    <line x1="165" y1="70" x2="155" y2="80" stroke-width="3"/>
                </g>
                <path id="part-8" class="draw-part" d="M 135 95 Q 150 105 165 95" stroke="#e74c3c" />
            </svg>
        </div>

    </div>

    <script>
        let wordsData = []; 
        let currentWordIndex = 0;
        let secretWord = "";
        let guessedLetters = [];
        let mistakes = 0;
        const MAX_MISTAKES = 8;
        
        const alphabet = "אבגדהוזחטיכלמנסעפצקרשת".split("");
        const finalToRegular = { 'ם': 'מ', 'ן': 'נ', 'ץ': 'צ', 'ף': 'פ', 'ך': 'כ' };

        window.onload = function() {
            const container = document.getElementById('words-inputs-container');
            for (let i = 1; i <= 10; i++) {
                const row = document.createElement('div');
                row.className = 'word-row';
                
                const numberSpan = document.createElement('span');
                numberSpan.innerText = i + '.';

                const catInput = document.createElement('input');
                catInput.type = 'text';
                catInput.className = 'cat-input';
                if (i === 1) catInput.placeholder = "נושא (למשל: מגמות)";
                else if (i === 2) catInput.placeholder = "נושא (למשל: אוכל)";
                else catInput.placeholder = "נושא";

                const wordInput = document.createElement('input');
                wordInput.type = 'text';
                wordInput.className = 'word-input';
                if (i === 1) wordInput.placeholder = "מילה (למשל: ביולוגיה) - חובה";
                else if (i === 2) wordInput.placeholder = "מילה (למשל: כריך)";
                else wordInput.placeholder = "מילה";

                row.appendChild(numberSpan);
                row.appendChild(catInput);
                row.appendChild(wordInput);
                container.appendChild(row);
            }
        };

        function startSession() {
            wordsData = [];
            const rows = document.querySelectorAll('.word-row');
            
            rows.forEach(row => {
                const catVal = row.querySelector('.cat-input').value.trim();
                const wordVal = row.querySelector('.word-input').value.trim();
                
                if (wordVal !== "") {
                    wordsData.push({
                        category: catVal !== "" ? catVal : "כללי",
                        word: wordVal
                    });
                }
            });

            if (wordsData.length === 0) return alert("נא להזין לפחות מילה אחת כדי להתחיל.");

            currentWordIndex = 0;
            
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            
            loadCurrentWord();
        }

        function loadCurrentWord() {
            const currentItem = wordsData[currentWordIndex];
            secretWord = currentItem.word;
            guessedLetters = [];
            mistakes = 0;
            
            document.getElementById('category-display').innerText = `נושא: ${currentItem.category}`;
            document.getElementById('word-counter-display').innerText = `מילה ${currentWordIndex + 1} מתוך ${wordsData.length}`;
            
            document.getElementById('status-msg').className = "status";
            document.getElementById('next-btn').style.display = 'none';
            
            resetVisuals();
            createLetters();
            renderGame();
        }

        function createLetters() {
            const container = document.getElementById('letters-container');
            container.innerHTML = "";
            alphabet.forEach(letter => {
                const btn = document.createElement('button');
                btn.innerText = letter;
                btn.className = 'letter-btn';
                btn.onclick = () => makeGuess(letter, btn);
                container.appendChild(btn);
            });
        }

        function makeGuess(pressedLetter, btn) {
            if (btn.classList.contains('disabled') || mistakes >= MAX_MISTAKES) return;

            let found = false;
            for (let char of secretWord) {
                if (char === pressedLetter || finalToRegular[char] === pressedLetter) {
                    found = true;
                    break;
                }
            }

            if (found) {
                guessedLetters.push(pressedLetter);
                btn.classList.add('correct', 'disabled');
            } else {
                mistakes++;
                btn.classList.add('wrong', 'disabled');
                updateHangmanVisual();
            }
            renderGame();
        }

        function updateHangmanVisual() {
            if (mistakes > 0 && mistakes <= MAX_MISTAKES) {
                setTimeout(() => {
                    document.getElementById(`part-${mistakes}`).classList.add('visible');
                }, 50);
            }
        }

        function resetVisuals() {
            document.querySelectorAll('.draw-part').forEach(part => {
                part.classList.remove('visible');
            });
        }

        function renderGame() {
            const wordDisplay = document.getElementById('word-display');
            wordDisplay.innerHTML = ""; 
            let won = true;
            
            for (let char of secretWord) {
                if (char === " ") {
                    const spaceSpan = document.createElement('span');
                    spaceSpan.className = 'space-box';
                    wordDisplay.appendChild(spaceSpan);
                } else {
                    let regularChar = finalToRegular[char] || char;
                    const letterBox = document.createElement('div');
                    
                    if (guessedLetters.includes(regularChar) || mistakes >= MAX_MISTAKES) {
                        letterBox.className = 'letter-box letter-pop';
                        letterBox.innerText = char;
                        
                        if (!guessedLetters.includes(regularChar) && mistakes >= MAX_MISTAKES) {
                            letterBox.style.color = '#e74c3c';
                        }
                    } else {
                        letterBox.className = 'letter-box';
                        letterBox.innerText = "";
                        won = false;
                    }
                    wordDisplay.appendChild(letterBox);
                }
            }
            
            const statusEl = document.getElementById('status-msg');
            statusEl.innerText = `פסילות: ${mistakes} מתוך ${MAX_MISTAKES}`;

            if (won && mistakes < MAX_MISTAKES) {
                statusEl.innerText = "כל הכבוד! הצלחתם! 🎉";
                statusEl.className = "status win";
                endRound();
            } else if (mistakes >= MAX_MISTAKES) {
                statusEl.innerText = `הפסדתם!`;
                statusEl.className = "status game-over";
                endRound();
            }
        }

        function endRound() {
            document.querySelectorAll('.letter-btn').forEach(b => b.classList.add('disabled'));
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.style.display = 'inline-block';
            
            if (currentWordIndex < wordsData.length - 1) {
                nextBtn.innerText = "המשך למילה הבאה";
            } else {
                nextBtn.innerText = "סיימנו! חזור להגדרות";
            }
        }

        function goToNextWord() {
            currentWordIndex++;
            if (currentWordIndex < wordsData.length) {
                loadCurrentWord();
            } else {
                document.getElementById('setup').classList.remove('hidden');
                document.getElementById('game-area').classList.add('hidden');
                
                document.querySelectorAll('.cat-input, .word-input').forEach(input => input.value = "");
            }
        }
    </script>
</body>
</html>
